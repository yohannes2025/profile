openapi: 3.0.3
info:
  title: Your Portfolio API
  version: 1.0.0
  description: API documentation for profile, blog, and project features.
paths:
  /api/blog/:
    get:
      operationId: api_blog_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBlogPostListList'
          description: ''
  /api/blog/{post_slug}/comments/:
    get:
      operationId: api_blog_comments_list
      parameters:
